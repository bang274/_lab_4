version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: travelbuddy_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent:
    build: .
    container_name: travelbuddy_agent
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - AGENT_API_KEY=${AGENT_API_KEY:-your-secret-api-key}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      - MONTHLY_BUDGET_USD=${MONTHLY_BUDGET_USD:-100.0}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - travelbuddy_network

networks:
  travelbuddy_network:
    driver: bridge

volumes:
  redis_data: